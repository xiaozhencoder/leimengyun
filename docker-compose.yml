services:
  postgres:
    image: postgres:16-alpine
    container_name: leimengyun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leimengyun
      POSTGRES_PASSWORD: leimengyun123
      POSTGRES_DB: leimengyun
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: leimengyun-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
